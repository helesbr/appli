<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoggTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 500px;
    }
    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 2rem;
      color: #e94560;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #16213e;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #e94560;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-add {
      background: #e94560;
      color: #fff;
    }
    .btn-add:hover { background: #c73e54; }
    .task-list {
      list-style: none;
    }
    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #16213e;
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .task-item span {
      font-size: 1rem;
      word-break: break-word;
    }
    .btn-delete {
      background: #533483;
      color: #fff;
      padding: 8px 14px;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .btn-delete:hover { background: #e94560; }
    .empty {
      text-align: center;
      color: #888;
      margin-top: 32px;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 MoggTrack</h1>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Nouvelle tâche..." maxlength="500">
      <button class="btn-add" id="addBtn">Ajouter</button>
    </div>
    <ul class="task-list" id="taskList"></ul>
    <p class="empty" id="emptyMsg">Aucune tâche pour le moment !</p>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');
    const emptyMsg = document.getElementById('emptyMsg');

    async function loadTasks() {
      const res = await fetch('/api/tasks');
      const tasks = await res.json();
      renderTasks(tasks);
    }

    function renderTasks(tasks) {
      taskList.innerHTML = '';
      emptyMsg.style.display = tasks.length === 0 ? 'block' : 'none';
      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.className = 'task-item';

        const span = document.createElement('span');
        span.textContent = task;

        const btn = document.createElement('button');
        btn.className = 'btn-delete';
        btn.textContent = '🗑️ Supprimer';
        btn.addEventListener('click', () => deleteTask(index));

        li.appendChild(span);
        li.appendChild(btn);
        taskList.appendChild(li);
      });
    }

    async function addTask() {
      const task = taskInput.value.trim();
      if (!task) return;
      const res = await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task })
      });
      if (res.ok) {
        const data = await res.json();
        renderTasks(data.tasks);
        taskInput.value = '';
        taskInput.focus();
      }
    }

    async function deleteTask(index) {
      const res = await fetch('/api/tasks/' + index, { method: 'DELETE' });
      if (res.ok) {
        const data = await res.json();
        renderTasks(data.tasks);
      }
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();

    // Synchronisation automatique toutes les 3 secondes
    setInterval(loadTasks, 3000);
  </script>
</body>
</html>
